colors.draw_bold_text_with_bright_colors = true

#Window Opacity
# [window]
# opacity = 0.9

#Ubuntu Mono Nerd Font
[font]
size = 12.0

[font.bold]
family = "UbuntuMono Nerd Font"
style = "Bold"

[font.bold_italic]
family = "UbuntuMono Nerd Font"
style = "Bold Italic"

[font.italic]
family = "UbuntuMono Nerd Font"
style = "Italic"

[font.normal]
family = "UbuntuMono Nerd Font"
style = "Regular"

[general]

# Dracula Color Scheme
# import = ["~/.config/alacritty/dracula.toml"]

# Duckbones color scheme
import = ["~/.config/alacritty/duckbones.toml"]
